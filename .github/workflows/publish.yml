name: Publish to npm

# Publishes `sportsing` to npm when a GitHub Release is published.
# Uses npm TRUSTED PUBLISHING (OIDC) — no NPM_TOKEN secret. Configure the trusted
# publisher once on npmjs.com (package → Settings → Trusted Publisher) pointing at
# repo `MicroMediaSites/sportsing` and workflow `publish.yml`. Provenance is
# attested from this public repo build.

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned to full commit SHAs (version in the comment)
      # so a retagged/compromised release can't enter the publish path.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v5

      # Gate the publish on the same checks as CI.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test

      # Publish with npm (its CLI is what supports OIDC trusted publishing +
      # --provenance; the package itself is a Bun CLI shipped as source).
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@^11 # pin to a major with trusted-publishing/OIDC support
      - run: npm publish --provenance --access public
