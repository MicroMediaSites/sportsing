name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: CI only needs to read the repo. No write scopes.
permissions:
  contents: read

# CI never launches the browser, so skip ui-leaf's postinstall binary download
# (a ~64MB GitHub-release fetch that exit(1)s on failure — it would otherwise be
# a network flake away from breaking every run).
env:
  UI_LEAF_SKIP_DOWNLOAD: "1"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to a full commit SHA (not a moving tag)
      # so a compromised/retagged release can't silently enter the build.
      # Version pin is in the trailing comment; bump via the dependabot PR.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v5
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - run: bun run build
