version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current: dependabot opens a PR that bumps
  # both the pinned SHA and the trailing version comment when a new release lands.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
  # devDependencies (TypeScript, Bun types — sportsing has no runtime deps).
  # dependabot reads package.json/bun.lock via the npm ecosystem and opens PRs
  # for CVE fixes and version bumps.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
